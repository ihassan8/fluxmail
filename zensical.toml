[project]
site_name = "FluxMail"
site_description = "Send emails from Python or the terminal — any SMTP server, zero config."
site_url = "https://vertex-ai-automations.github.io/fluxmail"
site_dir = "public"
repo_name = "FluxMail"
repo_url = "https://github.com/vertex-ai-automations/fluxmail"
copyright = "Copyright &copy; 2024–2026 Vertex AI Automations"
extra_css = ["css/extra.css"]

nav = [
  { "Overview" = "index.md" },
  { "Getting Started" = [{ "Installation" = "installation.md" }, { "Configuration" = "getting-started/configuration.md" }, { "CLI Usage" = "getting-started/cli_usage.md" }, { "Python API" = "getting-started/usage.md" }] },
  { "Reference" = [{ "API Reference" = "reference/api.md" }] },
]

# ── Theme ──────────────────────────────────────────────────────────────────────

[project.theme]
language = "en"
custom_dir = "docs/overrides"
logo = "img/fluxmail_192x192.png"
favicon = "img/favicon/favicon.ico"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "header.autohide",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
  "search.share",
  "toc.follow",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"
edit = "lucide/file-pen"
view = "lucide/eye"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "blue"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "blue"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ── Social / extra ─────────────────────────────────────────────────────────────

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/vertex-ai-automations/fluxmail"
name = "FluxMail on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/fluxmail/"
name = "FluxMail on PyPI"

# ── Plugins ────────────────────────────────────────────────────────────────────
# search is built-in and always enabled — no configuration needed.

[project.plugins.mkdocstrings]
enabled = true

[project.plugins.mkdocstrings.config]
default_handler = "python"

[project.plugins.mkdocstrings.config.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.config.handlers.python.options]
docstring_style = "numpy"
docstring_section_style = "spacy"
filters = ["!^_"]
heading_level = 2
inherited_members = false
merge_init_into_class = true
members_order = "source"
parameter_headings = true
show_root_heading = true
show_root_full_path = false
show_signature = true
show_signature_annotations = true
show_source = true
show_symbol_type_heading = true
show_symbol_type_toc = true
signature_crossrefs = true
summary = true

[project.plugins.mkdocstrings.config.handlers.python.options.docstring_options]
ignore_init_summary = true

# ── Markdown extensions ────────────────────────────────────────────────────────

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
permalink_title = "Link to this section"
toc_depth = 3

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"

[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
auto_title = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.magiclink]
normalize_issue_symbols = true
repo_url_shorthand = true
user = "vertex-ai-automations"
repo = "fluxmail"

[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.snippets]
base_path = ["docs/includes"]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]
