name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["*.*.*"]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Test
    uses: vertex-ai-automations/shared-workflows/.github/workflows/test.yml@025d8b3d710572d1d99b0b4263689f0f1ecce429
    with:
      python-versions: '["3.9", "3.10", "3.11", "3.12"]'
      os-matrix: '["ubuntu-latest", "windows-latest"]'
      install-command: 'pip install -e ".[test]"'
      test-command: 'pytest tests/ -v --tb=short'

  lint:
    name: Lint
    uses: vertex-ai-automations/shared-workflows/.github/workflows/lint.yml@025d8b3d710572d1d99b0b4263689f0f1ecce429

  typecheck:
    name: Type Check
    uses: vertex-ai-automations/shared-workflows/.github/workflows/typecheck.yml@025d8b3d710572d1d99b0b4263689f0f1ecce429
    with:
      install-command: 'pip install -e ".[test]" mypy'
      typecheck-command: 'mypy src/'

  audit:
    name: Audit
    uses: vertex-ai-automations/shared-workflows/.github/workflows/audit.yml@025d8b3d710572d1d99b0b4263689f0f1ecce429
    with:
      install-command: 'pip install -e ".[test]"'

  coverage:
    name: Coverage
    uses: vertex-ai-automations/shared-workflows/.github/workflows/coverage.yml@025d8b3d710572d1d99b0b4263689f0f1ecce429
    with:
      install-command: 'pip install -e ".[test]"'
      coverage-source: 'src/'